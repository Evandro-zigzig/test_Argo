apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: clean-api
  namespace: argocd
spec:
  description: Clean Architecture API project
  sourceRepos:
    - https://github.com/YOUR_ORG/YOUR_REPO.git
  destinations:
