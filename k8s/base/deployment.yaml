apiVersion: apps/v1
kind: Deployment
metadata:
  name: clean-api
  namespace: mentoria
  labels:
    app: clean-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clean-api
  template:
    metadata:
      labels:
        app: clean-api
    spec:
      containers:
        - name: clean-api
          image: kubeivan/kube-news:v2
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
